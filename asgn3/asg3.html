<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ASG 4 - 3D World</title>

    <!-- Load external libraries first -->
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/webgl-utils.js"></script>

    <!-- Load geometry -->
    <script src="geometry/geometry.js"></script>
    <script src="geometry/cube.js"></script>

    <!-- Load camera -->
    <script src="camera.js"></script>

    <!-- Load main -->
    <script src="asg3.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #111;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: monospace;
        color: #ccc;
      }
      #webgl { display: block; cursor: crosshair; }
      #hud {
        margin-top: 8px;
        font-size: 11px;
        letter-spacing: 1px;
        color: #555;
      }
      #info {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        color: #888;
        font-size: 11px;
        pointer-events: none;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 18px;
        pointer-events: none;
        text-shadow: 0 0 3px black;
      }
    </style>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="900" height="600">
      Please use a browser that supports "canvas"
    </canvas>
    <div id="hud">W/A/S/D move &nbsp;|&nbsp; Q/E turn &nbsp;|&nbsp; Mouse look (click canvas) &nbsp;|&nbsp; F add block &nbsp;|&nbsp; G remove block</div>
    <div id="info">Click canvas to lock mouse</div>
    <div id="crosshair">+</div>
  </body>
</html>
